        body {

            background-color: #1a1a1a;

            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #fa5c5c; }
        
        /* Social Media Section Styling */
        .social-links {
            margin: 25px 0 40px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .social-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .social-btn {
            display: inline-block;
            padding: 10px 20px;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .social-btn:hover { opacity: 0.8; }
        
        /* Platform Colors */
        .fb { background-color: #1877f2; }
        .ig { background-color: #e1306c; }
        .x-com { background-color: #000000; border: 1px solid #333; }
        .yt { background-color: #ff0000; }
        .tt { background-color: #010101; border: 1px solid #ee1d52; }
        .rd { background-color: #ff4500; }
        .st { background-color: #171a21; border: 1px solid #66c0f4; }
        .tw { background-color: #9146ff; }
        .sp { background-color: #1ed760; color: #000; } /* Dark text for Spotify readability */
        .eb { background-color: #0064d2; border: 1px solid #e53238; }

        .widget-container {
            margin: 30px auto;
            max-width: 552px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 552px;
            margin: 0 auto;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        h2 {
            color: #dadada;
            margin-top: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
    </style>
</head>
